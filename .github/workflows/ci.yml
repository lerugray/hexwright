name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Checks that need operator data under local/ (gitignored) SKIP and
      # exit 0 on a fresh clone; the bundled-demo check always runs for real.
      - run: npm test
